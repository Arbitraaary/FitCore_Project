<mat-sidenav-container class="shell">

  <!-- ── Sidenav ─────────────────────────────────────────────────────────── -->
  <mat-sidenav
    [class.sidenav--collapsed]="!sidenavOpen()"
    [opened]="sidenavOpen()"
    class="sidenav"
    mode="side"
  >
    <!-- Logo / wordmark -->
    <div class="sidenav__brand">
      <div class="sidenav__logo">
        <span class="sidenav__logo-icon">G</span>
      </div>
      @if (sidenavOpen()) {
        <span class="sidenav__wordmark">GymOS</span>
      }
    </div>

    <mat-divider />

    <!-- Nav links -->
    <nav class="sidenav__nav">
      @for (item of navItems(); track item.route) {
        <a
          [matTooltip]="sidenavOpen() ? '' : item.label"
          [routerLink]="item.route"
          class="sidenav__link"
          matTooltipPosition="right"
          routerLinkActive="sidenav__link--active"
        >
          <mat-icon class="sidenav__link-icon">{{ item.icon }}</mat-icon>
          @if (sidenavOpen()) {
            <span class="sidenav__link-label">{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <!-- Role badge at bottom -->
    <div class="sidenav__role">
      <span [class.chip--accent]="role() === 'coach'" [class.chip--primary]="role() === 'manager'" class="chip">
        <mat-icon
          style="font-size:14px;width:14px;height:14px;">{{ role() === 'manager' ? 'manage_accounts' : 'sports' }}</mat-icon>
        @if (sidenavOpen()) {
          {{ role() | titlecase }}
        }
      </span>
    </div>
  </mat-sidenav>

  <!-- ── Main area ───────────────────────────────────────────────────────── -->
  <mat-sidenav-content class="shell__content">

    <!-- Topbar -->
    <mat-toolbar class="topbar">
      <button (click)="toggleSidenav()" class="topbar__menu-btn" mat-icon-button>
        <mat-icon>{{ sidenavOpen() ? 'menu_open' : 'menu' }}</mat-icon>
      </button>

      <span class="topbar__spacer"></span>

      <!-- Avatar / user menu -->
      <div class="topbar__avatar">
        <button [matMenuTriggerFor]="userMenu"  mat-icon-button>
          <span class="avatar">{{ initials() }}</span>
        </button>
      </div>
      <mat-menu #userMenu>
        <div class="user-menu-header">
          <strong>{{ fullName() }}</strong>
          <small>{{ user()?.email }}</small>
        </div>
        <mat-divider />
        <button (click)="logout()" mat-menu-item>
          <mat-icon>logout</mat-icon>
          Log out
        </button>
      </mat-menu>
    </mat-toolbar>

    <!-- Page content -->
    <main class="shell__page">
      <router-outlet />
    </main>

  </mat-sidenav-content>
</mat-sidenav-container>
